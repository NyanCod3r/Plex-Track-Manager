name: ci Plex-Track-Manager

on:
  push:
    branches:
      - master
      - beta-test

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          load: true
          tags: nyancod3r/plex-track-manager:test

      - name: Run Tests
        run: |
          docker run --rm --name test \
          -e PYTHONPATH=/app/src \
          nyancod3r/plex-track-manager:test python -m unittest discover -s /app/tests -v

  release:
    needs: test
    if: "!contains(github.event.head_commit.message, 'test')"
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release Please (semantic versioning & release notes)
        id: release
        uses: googleapis/release-please-action@v4

  docker:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12, 3.13]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            nyancod3r/plex-track-manager:latest
            nyancod3r/plex-track-manager:${{ needs.release.outputs.tag_name }}
          build-args: |
            RELEASE_VERSION=${{ needs.release.outputs.tag_name }}

  beta_release:
    needs: test
    if: "contains(github.event.head_commit.message, 'test')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push beta Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: nyancod3r/plex-track-manager:beta
          build-args: |
            RELEASE_VERSION=beta-${{ github.sha }}